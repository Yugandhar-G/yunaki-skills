name: yunaki-skills
region: sfo
ingress:
  rules:
    - component:
        name: yunaki-app
      match:
        path:
          prefix: /
services:
  - name: yunaki-app
    git:
      repo_clone_url: https://github.com/Yugandhar-G/yunaki-skills.git
      branch: main
    dockerfile_path: Dockerfile
    source_dir: /
    run_command: uvicorn yunaki_skills.main:app --host 0.0.0.0 --port 8000
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: GEMINI_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: DO_MODEL_ACCESS_KEY
        scope: RUN_TIME
        type: SECRET
      - key: MONGODB_URI
        scope: RUN_TIME
        type: SECRET
      - key: MONGO_DB
        scope: RUN_TIME
        value: yunaki
      - key: AUTH_ENABLED
        scope: RUN_TIME
        value: "false"
      - key: PYTHONPATH
        scope: RUN_TIME
        value: "/app/src"
    health_check:
      http_path: /health
      initial_delay_seconds: 30
