# Shared super-memory service — runs on any Docker host (e.g. a $6 DigitalOcean Droplet).
# The markdown fact store lives on a named volume so it persists across restarts/redeploys.
#
#   cp server/.env.example .env   # then fill in tokens / secrets
#   docker compose up -d --build
services:
  supermem:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      YUNAKI_FACTS_DIR: /data
    volumes:
      - supermem_data:/data
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health',timeout=3).status==200 else 1)"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  supermem_data:
