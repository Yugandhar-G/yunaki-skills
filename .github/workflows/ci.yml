name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # Name kept as "lint • typecheck • test" to match the required status checks
    # configured on main's branch protection.
    name: lint • typecheck • test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install tooling
        # Core CLI is stdlib-only; the server deps (FastAPI + httpx) are installed so the
        # server tests actually run in CI rather than being skipped.
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff mypy httpx -r server/requirements.txt

      - name: Lint (ruff)
        run: ruff check *.py server/ tests/

      - name: Format check (ruff)
        run: ruff format --check *.py server/ tests/

      - name: Type check (mypy)
        # Advisory — reports type issues without blocking the build.
        continue-on-error: true
        run: mypy --ignore-missing-imports *.py server/

      - name: Test (pytest)
        # Fully offline — no network, no LLM, no live worker, no real gh — so no secrets
        # or services are required. Server tests use FastAPI's TestClient.
        run: pytest tests/ -q
