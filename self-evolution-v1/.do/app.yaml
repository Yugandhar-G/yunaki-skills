name: yunaki-skills
region: sfo
ingress:
  rules:
    - component:
        name: yunaki-app
      match:
        path:
          prefix: /
services:
  - name: yunaki-app
    git:
      repo_clone_url: https://github.com/Yugandhar-G/yunaki-skills.git
      branch: main
    dockerfile_path: Dockerfile
    run_command: uvicorn yunaki_skills.main:app --host 0.0.0.0 --port 8000
    envs:
      - key: PYTHONPATH
        value: /app/src
      - key: PORT
        value: "8000"
      - key: MONGO_DB
        value: yunaki
      - key: GEMINI_API_KEY
        value: ""
        type: SECRET
      - key: DO_MODEL_ACCESS_KEY
        value: ""
        type: SECRET
      - key: MONGODB_URI
        value: ""
        type: SECRET
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /health
      port: 8000
