name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint • typecheck • test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Format check (ruff)
        run: ruff format --check src tests

      - name: Type check (mypy)
        # Advisory until the codebase completes its gradual-typing pass (the
        # interface-subclassing idiom currently trips no-redef). Reports type
        # issues without blocking the build.
        continue-on-error: true
        run: mypy --ignore-missing-imports src/yunaki_skills

      - name: Test (pytest + coverage)
        # CI runs without MongoDB/Gemini/DO — every external dependency is
        # mocked in the suite, so no secrets are required here.
        run: pytest --cov=yunaki_skills --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore
